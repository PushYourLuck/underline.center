<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        /* styles.css */
        @page {
            size: A4 landscape;
            margin: 0;
        }

        html,
        body {
            margin: 0;
            padding: 0;
            background-color: #fff;
            font-family: 'Open Sans', sans-serif;
            font-weight: 400;
        }

        #bingo-container {
            display: block;
            width: 297mm;
            margin: 0 auto;
        }

        .bingo-board {
            display: grid;
            /* Adjusted for header/footer space and better legibility */
            grid-template-columns: repeat(5, 50mm);
            grid-template-rows: repeat(5, 28mm);
            gap: 2mm;
            width: 297mm;
            height: 210mm;
            box-sizing: border-box;
            page-break-after: always;
            justify-content: center;
            align-content: center;
            /* Room for pre-printed header and footer */
            padding-top: 10mm;
            padding-bottom: 40mm;
            padding-left: 10mm;
            padding-right: 10mm;
            background-color: white;
            position: relative;
        }

        .seed-display {
            position: absolute;
            bottom: 10mm;
            right: 15mm;
            font-size: 10px;
            color: #999;
            font-family: monospace;
        }

        /* Screen-only styling for preview */
        @media screen {
            body {
                background-color: #f0f0f0;
                display: flex;
                justify-content: center;
                padding: 20px;
            }

            .bingo-board {
                margin-bottom: 20px;
                box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            }
        }

        .bingo-tile {
            position: relative;
            border: 2px solid black;
            display: flex;
            justify-content: center;
            align-items: center;
            box-sizing: border-box;
            overflow: hidden;
            background: white;
            padding: 4mm;
        }

        .bingo-tile span {
            display: block;
            text-align: center;
            word-wrap: break-word;
            overflow-wrap: break-word;
            line-height: 1.1;
            white-space: normal;
            color: black;
        }

        .bingo-tile img {
            position: absolute;
            width: 70%;
            height: 70%;
            object-fit: contain;
            opacity: 0.2;
            display: none;
        }

        .bingo-tile.active img {
            display: block;
        }

        .big-text {
            font-family: 'Alegreya', serif;
            font-size: 20px;
            font-weight: 800;
            text-transform: capitalize;
            line-height: 1.1;
            margin-bottom: 6px;
            display: block;
        }

        .small-text {
            font-family: 'Open Sans', sans-serif;
            font-size: 13px;
            font-weight: 400;
            line-height: 1.3;
            display: block;
        }
    </style>

<body>
    <div id="bingo-container">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/bignumber.js/9.1.2/bignumber.min.js"
        integrity="sha512-9JMv6qShmz4L6iAvMaEoIaFtS4XGSk/jeTSR2vzieg0XS5njYvBvYk0YcvI59dLN/0B+QnG5HfGR+Mqubl78SA=="

    <script src="/assets/rusha.min.js"></script>
    <script>



        // Seeded PRNG helpers
        function cyrb128(str) {
            let h1 = 1779033703, h2 = 3144134277,
                h3 = 1013904242, h4 = 2773480762;
            for (let i = 0, k; i < str.length; i++) {
                k = str.charCodeAt(i);
                h1 = h2 ^ Math.imul(h1 ^ k, 597399067);
                h2 = h3 ^ Math.imul(h2 ^ k, 2869860233);
                h3 = h4 ^ Math.imul(h3 ^ k, 951274213);
                h4 = h1 ^ Math.imul(h4 ^ k, 2716044179);
            }
            h1 = Math.imul(h3 ^ (h1 >>> 18), 597399067);
            h2 = Math.imul(h4 ^ (h2 >>> 22), 2869860233);
            h3 = Math.imul(h1 ^ (h3 >>> 17), 951274213);
            h4 = Math.imul(h2 ^ (h4 >>> 19), 2716044179);
            return [(h1 >>> 0), (h2 >>> 0), (h3 >>> 0), (h4 >>> 0)];
        }

        function sfc32(a, b, c, d) {
            return function () {
                a >>>= 0; b >>>= 0; c >>>= 0; d >>>= 0;
                var t = (a + b | 0) + d | 0;
                d = d + 1 | 0;
                a = b ^ b >>> 9;
                b = c + (c << 3) | 0;
                c = (c << 21 | c >>> 11);
                c = c + t | 0;
                return (t >>> 0) / 4294967296;
            }
        }

        function createRandom(seed) {
            const hash = cyrb128(seed);
            return sfc32(hash[0], hash[1], hash[2], hash[3]);
        }

        function generateRandomSeed(rowCount) {
            const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
            let seed = '';
            for (let i = 0; i < 3; i++) {
                seed += chars.charAt(Math.floor(Math.random() * chars.length));
            }
            // Encode rowCount in 2 chars (Base36, max 1295)
            const countPart = Math.min(rowCount, 1295).toString(36).toUpperCase().padStart(2, '0');
            return seed + countPart;
        }

        // function that gets a random value from data for a given point value and ensure the points are unique for a given board name which is not part of the data
        function getRandomValue(data, key, boardName, randomFn) {
            if (!data[key]) return null;
            const filteredData = data[key].filter(item => !item.usedIn || !item.usedIn.includes(boardName));
            if (filteredData.length === 0) return null; // No available items for this point value
            const randomIndex = Math.floor(randomFn() * filteredData.length);
            const selectedItem = filteredData[randomIndex];

            // Mark the item as used in the current board
            if (!selectedItem.usedIn) {
                selectedItem.usedIn = [];
            }
            selectedItem.usedIn.push(boardName);

            return selectedItem;
        }


        Papa.parse("https://docs.google.com/spreadsheets/d/e/2PACX-1vSSwymPjPwM96FIphgTzDB6P30xhoMhLMtZbdPiVU_0HzsN5MVdLfcW3hzE8khLLtW6GcREDZ1qxeFu/pub?gid=1648893520&single=true&output=csv", {
            download: true,
            header: true,
            complete: function (results, file) {
                const urlParams = new URLSearchParams(window.location.search);
                const urlSeed = urlParams.get('seed')?.toUpperCase();

                let rows = results.data;
                const originalRowCount = rows.length;

                // If seed is provided and is 5 chars, slice rows to the count encoded in the seed
                if (urlSeed && urlSeed.length === 5) {
                    const snapshotSize = parseInt(urlSeed.slice(3), 36);
                    if (!isNaN(snapshotSize)) {
                        rows = rows.slice(0, snapshotSize);
                    }
                }

                const data = {
                    '1G': [], '1I': [],
                    '2G': [], '2I': [],
                    '3G': [], '3I': [],
                    '4G': [], '4I': [],
                    '5G': [], '5I': []
                }
                rows.forEach((row, index) => {
                    if (row['points'] && row['points'].trim() !== '') {
                        const points = parseInt(row['points'], 10);
                        const category = row['category'] ? row['category'].trim() : 'G'; // Default to G if category is missing
                        const key = `${points}${category}`;
                        if (data[key]) {
                            data[key].push(row);
                        }
                    }
                });
                console.log(data);

                const NUM_OF_BOARDS = urlSeed ? 1 : 10;

                // create a bingo board for each 25 items in the data based on the following logic of where point values are placed
                // 1G	3I	5G	2G	4G
                // 2G	4G	1G	3G	4I
                // 3G	5G	2I	4G	1G
                // 4I	1G	3G	5G	2G
                // 5G	2G	4G	1I	3G
                const pointPlacement = [
                    '1G', '3I', '5G', '2G', '4G',
                    '2G', '4G', '1G', '3G', '4I',
                    '3G', '5G', '2I', '4G', '1G',
                    '4I', '1G', '3G', '5G', '2G',
                    '5G', '2G', '4G', '1I', '3G'
                ];

                function rotateGrid(grid, rotations) {
                    const size = 5;
                    let currentGrid = [...grid];
                    for (let r = 0; r < (rotations % 4); r++) {
                        let nextGrid = new Array(size * size);
                        for (let row = 0; row < size; row++) {
                            for (let col = 0; col < size; col++) {
                                // (row, col) -> (col, size - 1 - row) for 90deg clockwise
                                nextGrid[col * size + (size - 1 - row)] = currentGrid[row * size + col];
                            }
                        }
                        currentGrid = nextGrid;
                    }
                    return currentGrid;
                }

                for (let i = 0; i < NUM_OF_BOARDS; i++) {
                    const boardSeed = urlSeed || generateRandomSeed(originalRowCount);
                    const boardRandom = createRandom(boardSeed);
                    const rotations = Math.floor(boardRandom() * 4);
                    const rotatedPlacement = rotateGrid(pointPlacement, rotations);

                    const bingoBoardNumber = i;
                    const boardId = `bingo-board-${bingoBoardNumber}`;
                    const boardName = boardSeed; // Use seed as board name for uniqueness tracking

                    rotatedPlacement.forEach((key, index) => {
                        const randomValue = getRandomValue(data, key, boardName, boardRandom);

                        if (randomValue) {
                            // Create a tile for the bingo board
                            let bingoBoard = document.getElementById(boardId);
                            // if bingoBoard does not exist, create it
                            if (!bingoBoard) {
                                const newBingoBoard = document.createElement('div');
                                newBingoBoard.id = boardId;
                                newBingoBoard.className = 'bingo-board';

                                // Add seed display
                                const seedDiv = document.createElement('div');
                                seedDiv.className = 'seed-display';
                                seedDiv.innerText = `SEED: ${boardSeed}`;
                                newBingoBoard.appendChild(seedDiv);

                                document.getElementById('bingo-container').appendChild(newBingoBoard);
                                bingoBoard = newBingoBoard;
                            }
                            if (bingoBoard) {
                                const tile = document.createElement('div');
                                tile.className = 'bingo-tile';
                                tile.innerHTML = `
                                    <span>
                                        <span class="big-text">${randomValue['big_text']}</span>
                                        <span class="small-text">${randomValue['small_text']}</span>
                                    </span>
                                `;
                                bingoBoard.appendChild(tile);
                            }
                        }
                    });
                }

                // results.data.forEach((row, index) => {

                //     const bingoBoardNumber = Math.floor((index)/25)


                //     let bingoBoard = document.getElementById(`bingo-board-${bingoBoardNumber}`);
                //     // if bingoBoard does not exist, create it
                //     if (!bingoBoard) {
                //         const newBingoBoard = document.createElement('div');
                //         newBingoBoard.id = `bingo-board-${bingoBoardNumber}`;
                //         newBingoBoard.className = 'bingo-board';
                //         document.getElementById('bingo-container').appendChild(newBingoBoard);
                //         bingoBoard = newBingoBoard;
                //     }




                //     const tile = document.createElement('div');
                //     tile.className = 'bingo-tile';
                //     tile.innerHTML = `<span style='font-size:13px;'>${row['small_text']}<br/><span style='font-size:16px; font-weight:600; padding-top:10px;'>${row['big_text']}</span></span>`;
                //     bingoBoard.appendChild(tile);
                // });
            }
        });

    </script>
