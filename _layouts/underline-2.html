<!DOCTYPE html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{page.title}}</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@picocss/pico@next/css/pico.min.css"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="/assets/icons/apple-touch-icon.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="/assets/icons/favicon-32x32.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="16x16"
      href="/assets/icons/favicon-16x16.png"
    />
    <link rel="manifest" href="/assets/icons/site.webmanifest" />
    <link
      rel="mask-icon"
      href="/assets/icons/safari-pinned-tab.svg"
      color="#5bbad5"
    />
    <link rel="shortcut icon" href="/assets/icons/favicon.ico" />
    <meta name="msapplication-TileColor" content="#da532c" />
    <meta
      name="msapplication-config"
      content="/assets/icons/browserconfig.xml"
    />
    <meta name="theme-color" content="#ffffff" />
    <link
      href="https://fonts.googleapis.com/css2?family=Alegreya+Sans+SC:wght@700&family=Lato:wght@300&family=Lato:wght@400&display=swap"
      rel="stylesheet"
    />
    <style>
      html {
        height: 100%;
        background-color: var(--background);
      }
      body {
        min-height: 100%;
        position: relative;
        margin: 0;
      }
      
      [id] {
        scroll-margin-top: 100px; /* Accounts for sticky header height */
      }
      
      .main-header {
        position: sticky;
        top: 0;
        z-index: 1000;
        background-color: rgba(239, 230, 215, 0.8); /* Semi-transparent version of --background */
        backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0,0,0,0.05);
        padding: 0.5rem 4rem; /* Increased horizontal padding */
      }

      .main-header nav {
        margin-bottom: 0;
        display: flex;
        align-items: center;
        height: 100%;
      }

      .main-header ul {
        display: flex;
        align-items: center;
        list-style: none;
        margin: 0;
        padding: 0;
      }

      .main-header li {
        display: flex;
        align-items: center;
        padding: 0;
      }

      .main-header .logo-link {
        display: flex;
        align-items: center;
        padding: 0;
      }

      .main-header .nav-logo {
        max-height: 32px;
        transition: transform 0.2s;
        display: block;
        margin: 0;
      }

      .main-header .nav-logo:hover {
        transform: scale(1.02);
      }

      .main-header .register-link {
        padding: 0.35rem 1rem; /* Reduced internal button padding */
        border-radius: 50px;
        font-weight: 700;
        font-size: 0.8rem; /* Slightly smaller font */
        background-color: var(--red);
        color: white !important;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        transition: background-color 0.2s, transform 0.1s;
        text-decoration: none;
      }

      .main-header .register-link:hover {
        background-color: var(--orange);
        transform: translateY(-1px);
        text-decoration: none;
      }

      .main-header .register-link:active {
        transform: translateY(0);
      }

      body::after {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-image: linear-gradient(
            rgba(255, 255, 255, 0.5),
            rgba(255, 255, 255, 0.5)
          ),
          url("/assets/underline/shape-background.svg");
        background-repeat: no-repeat;
        background-position: center;
        background-size: cover;
        background-blend-mode: multiply;
        filter: opacity(0.1);
        mix-blend-mode: multiply;
        pointer-events: none;
        z-index: -1;
      }

      :root {
        --red: hsl(10, 67%, 54%);
        --orange: hsl(20, 100%, 71%);
        --aqua: hsl(194, 62%, 61%);
        --green: hsl(146, 58%, 34%);
        --yellow: hsl(52, 96%, 57%);
        --teal: hsl(195, 48%, 34%);
        --pink: hsl(330, 100%, 78%);
        --blue: hsl(212, 71%, 45%);
        --black: hsl(210, 4%, 22%);
        --background: #efe6d7;
        --box-shadow-color: var(--yellow);
        --overlap-top: 25px;
        --overlap-left: 25px;
        --overlap-top-negative: calc(-1 * var(--overlap-top));
        --overlap-left-negative: calc(-1 * var(--overlap-left));
        --pico-font-family: "Lato", sans-serif;
        --pico-font-weight: 500;
        --pico-font-style: normal;
      }

      h1, h2, h3 {
        --pico-font-family: "Alegreya Sans SC", sans-serif;
        --pico-font-weight: 700;
        --pico-font-style: normal;
        --pico-line-height: 1.2;
        letter-spacing: 0.05em;
      }
      
      h1 { text-align: center; }

      /* Custom styles for Summer Break */
      .sticky-header {
        position: sticky;
        top: 0;
        z-index: 100;
        background-color: var(--background);
        padding: 1rem 0;
        border-bottom: 2px solid var(--orange);
        margin-bottom: 2rem;
      }

      .event-card {
        background: white;
        border-radius: 20px;
        padding: 1.5rem;
        margin-bottom: 2rem;
        box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        position: relative;
        overflow: hidden;
        border: 1px solid rgba(0,0,0,0.05);
      }

      .host-tag {
        font-weight: 700;
        color: var(--teal);
        text-transform: uppercase;
        font-size: 0.8rem;
        letter-spacing: 0.05em;
        margin-bottom: 0.25rem;
        display: block;
      }

      .date-tag {
        font-weight: 400;
        color: var(--black);
        font-size: 0.9rem;
        margin-bottom: 1rem;
        display: block;
        opacity: 0.7;
      }

      .hero-section {
        padding: 4rem 0;
        border-bottom: 1px dashed var(--black);
        margin-bottom: 4rem;
      }

      .jump-button {
        background-color: var(--orange);
        border-color: var(--orange);
        color: white;
      }
      
      .jump-button:hover {
        background-color: var(--red);
        border-color: var(--red);
      }
    </style>
  </head>

  <body>
    <header class="main-header container-fluid">
      <nav>
        <ul>
          <li>
            <a href="https://underline.center/" class="logo-link">
              <img src="/assets/underline/Underline Logo with Type_transparent.png" class="nav-logo" alt="Underline Logo" />
            </a>
          </li>
        </ul>
        <ul>
          <li><a href="#register" class="register-link contrast">Register</a></li>
        </ul>
      </nav>
    </header>
    <main class="container-fluid" style="max-width: 1000px; margin: 0 auto; padding: 4rem 1rem;">
      {{content}}
    </main>
    <footer class="container-fluid">
      <div style="text-align: center; font-size: 0.8em">
        <img
          src="/assets/underline/Underline Logo with Type_transparent.png"
          style="max-height: 100px"
        />
        <p>
          3rd Floor, Above Blue Tokai Coffee Roasters<br />No. 24, Double Road,
          Indiranagar, Bangalore - 560071<br /><a
            href="https://maps.app.goo.gl/qa4yF16LJ7cGSE6EA"
            target="_blank"
            >Google Maps ↗</a
          >
        </p>
      </div>
    </footer>
  </body>
</html>
